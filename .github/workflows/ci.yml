name: CI — JORANA IA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-web:
    name: Build Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root)
        working-directory: .
        run: npm install

      - name: Type check frontend
        run: npx tsc --noEmit

  build-api:
    name: Build Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root)
        working-directory: .
        run: npm install

      - name: Build API
        run: npx nest build
